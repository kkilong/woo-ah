// URL에서 참가자 번호 가져오기 (?target=1)

const target = params.get("target");

const cloud = document.getElementById("cloud");

  "1": "참가자 1",

  "14": "참가자 14"
};

title.innerText = participants[target] || "참가자";

// 키워드 카드 생성
function createKeyword(text) {
  const div = document.createElement("div");
  div.className = "keyword";
  div.innerText = text;
  cloud.appendChild(div);
}

// Firestore에서 키워드 불러오기
db.collection("keywords")
  .where("target", "==", target)
  .onSnapshot(snapshot => {

    cloud.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();
      createKeyword(data.keyword);
    });

  });


// ===== 버튼 연결 =====

// 기존 캐릭터 페이지
